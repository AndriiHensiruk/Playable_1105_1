<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playable_1105_1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            overflow: hidden;
            background: #1a1a1a;
        }
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 1.5s ease-out, filter 1s ease-in-out;
            transform: scale(1.1); /* Трохи зменшив початковий зум для плавності */
        }

        .scene.active {
            opacity: 1;
            transform: scale(1);
        }

        .blur {
            filter: blur(5px) brightness(0.7);
        }
        #text-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-img {
            display: none;
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        .text-img.show {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        #ui-container {
            position: absolute;
            bottom: 22%;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s active;
        }

        .btn img {
            width: 220px;
            display: block;
        }

        .hidden { display: none !important; }

        .pulse {
            animation: pulseEffect 1.8s infinite ease-in-out;
        }

        @keyframes pulseEffect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.2) drop-shadow(0 0 10px rgba(255,215,0,0.4)); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .fade-in {
            animation: fadeInBtn 0.6s ease-out forwards;
        }

        @keyframes fadeInBtn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="scenes-container">
            <div class="scene active blur" id="scene-1" style="background-image: url('assets/bg1.webp');"></div>
            <div class="scene" id="scene-2" style="background-image: url('assets/bg2.webp');"></div>
            <div class="scene" id="scene-3" style="background-image: url('assets/bg3.webp');"></div>
            <div class="scene" id="scene-4" style="background-image: url('assets/bg4.webp');"></div>
        </div>

        <div id="text-container">
            <img src="assets/text1.webp" class="text-img" id="text-1">
            <img src="assets/text2.webp" class="text-img" id="text-2">
            <img src="assets/text3.webp" class="text-img" id="text-3">
            <img src="assets/text4.webp" class="text-img" id="text-4">
        </div>

        <div id="ui-container">
            <button id="next-btn" class="btn pulse">
                <img src="assets/yellow_button.webp" alt="Далі">
            </button>
            <button id="final-btn" class="btn hidden">
                <img src="assets/final_button.webp" alt="До коміксу">
            </button>
        </div>
    </div>

    <audio id="bg-music" loop src="assets/music.mp3"></audio>
    <audio id="voice-1" src="assets/voice1.mp3"></audio>
    <audio id="voice-2" src="assets/voice2.mp3"></audio>
    <audio id="voice-3" src="assets/voice3.mp3"></audio>
    <audio id="voice-4" src="assets/voice4.mp3"></audio>

    <script>
        const scenes = document.querySelectorAll('.scene');
        const texts = document.querySelectorAll('.text-img');
        const nextBtn = document.getElementById('next-btn');
        const finalBtn = document.getElementById('final-btn');
        const bgMusic = document.getElementById('bg-music');

        let currentStep = 0;
        let isTransitioning = false;

        function updateScene(index) {
            if (isTransitioning) return;
            isTransitioning = true;

            texts.forEach(t => t.classList.remove('show'));

            if (index === 0) {
                scenes[0].classList.remove('blur');
            } else {
                scenes.forEach(s => s.classList.remove('active'));
                scenes[index].classList.add('active');
            }

            setTimeout(() => {
                texts[index].classList.add('show');
                
                for(let i=1; i<=4; i++) {
                    const v = document.getElementById(`voice-${i}`);
                    v.pause();
                    v.currentTime = 0;
                }

                const voice = document.getElementById(`voice-${index + 1}`);
                if (voice) {
                    voice.play().catch(e => console.log("Audio play prevented"));
                }
                isTransitioning = false;
            }, 500);

            if (index === 3) {
                nextBtn.classList.add('hidden');
                finalBtn.classList.remove('hidden');
                finalBtn.classList.add('fade-in', 'pulse');
            }
        }

        nextBtn.addEventListener('click', () => {
            if (isTransitioning) return;

            if (currentStep === 0) {
                bgMusic.volume = 0.2; // Фонова музика тихіше за голос
                bgMusic.play().catch(err => {});
                updateScene(0);
                currentStep = 1;
            } else if (currentStep < 4) {
                updateScene(currentStep);
                currentStep++;
            }
        });

        finalBtn.addEventListener('click', () => {
            window.location.href = "https://honeytoon.com/comic-video/honeymoon-with-my-mother-in-law?n=1";
        });
    </script>
</body>
</html>
